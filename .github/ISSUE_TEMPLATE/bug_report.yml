name: Bug Report
description: Report a bug in Aquifer
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Aquifer Version
      description: "Build version or commit hash"
      placeholder: "0.1.0 / abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      description: "Operating system, kernel version, and architecture"
      placeholder: "Ubuntu 24.04, kernel 6.8.0, x86_64"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which component is affected?"
      options:
        - Go implant
        - Python C2 server
        - Build system (Makefile)
        - Namespace isolation
        - Stealth modules
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Build with `make build`
        2. Run the implant with...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
